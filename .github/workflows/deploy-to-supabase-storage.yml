name: Deploy to Supabase Storage

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure bucket exists and upload site files
        shell: bash
        env:
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${SUPABASE_PROJECT_REF}" ]]; then
            echo "Missing GitHub variable: SUPABASE_PROJECT_REF" >&2
            exit 1
          fi

          if [[ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            echo "Missing GitHub secret: SUPABASE_SERVICE_ROLE_KEY" >&2
            exit 1
          fi

          SUPABASE_STORAGE_BUCKET="${SUPABASE_STORAGE_BUCKET:-flow-climber}"

          SUPABASE_URL="https://${SUPABASE_PROJECT_REF}.supabase.co"

          create_bucket_response=$(
            curl -sS -o /dev/null -w "%{http_code}" \
              -X POST "${SUPABASE_URL}/storage/v1/bucket" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"${SUPABASE_STORAGE_BUCKET}\",\"public\":true}"
          )

          if [[ "${create_bucket_response}" != "200" && "${create_bucket_response}" != "409" ]]; then
            echo "Bucket creation failed with HTTP ${create_bucket_response}" >&2
            exit 1
          fi

          upload_file() {
            local source_path="$1"
            local object_path="$2"
            local content_type="$3"

            curl -sS -X POST "${SUPABASE_URL}/storage/v1/object/${SUPABASE_STORAGE_BUCKET}/${object_path}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "x-upsert: true" \
              -H "Content-Type: ${content_type}" \
              --data-binary "@${source_path}" >/dev/null
          }

          upload_file "index.html" "index.html" "text/html; charset=utf-8"
          upload_file "game.js" "game.js" "application/javascript; charset=utf-8"
          upload_file "telemetry.js" "telemetry.js" "application/javascript; charset=utf-8"
          upload_file "spawn-worker.js" "spawn-worker.js" "application/javascript; charset=utf-8"

          echo "Deployed to ${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_STORAGE_BUCKET}/index.html"
